version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: mongo_db
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/testdb

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo_data: